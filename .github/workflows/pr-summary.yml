name: PR Summary

on:
  pull_request:
    branches: [main, master]
    types: [opened, synchronize]

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate PR summary
        run: |
          echo "## 📋 Pull Request Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Count changed files
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | wc -l)
          MD_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -c "\.md$" || echo "0")
          
          echo "- **Files changed:** $CHANGED_FILES" >> $GITHUB_STEP_SUMMARY
          echo "- **Markdown files:** $MD_FILES" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # List changed markdown files
          if [ "$MD_FILES" -gt 0 ]; then
            echo "### 📝 Changed Documentation" >> $GITHUB_STEP_SUMMARY
            git diff --name-only origin/${{ github.base_ref }}...HEAD | grep "\.md$" | while read file; do
              echo "- \`$file\`" >> $GITHUB_STEP_SUMMARY
            done
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Check for new files
          NEW_FILES=$(git diff --name-only --diff-filter=A origin/${{ github.base_ref }}...HEAD | grep "\.md$" | wc -l || echo "0")
          if [ "$NEW_FILES" -gt 0 ]; then
            echo "### ✨ New Documentation" >> $GITHUB_STEP_SUMMARY
            git diff --name-only --diff-filter=A origin/${{ github.base_ref }}...HEAD | grep "\.md$" | while read file; do
              echo "- \`$file\`" >> $GITHUB_STEP_SUMMARY
            done
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "### 🔍 Validation Status" >> $GITHUB_STEP_SUMMARY
          echo "The following checks will be performed:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Markdown linting" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ MkDocs build validation" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Link checking" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Spell checking" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ YAML validation" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ File naming conventions" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Image optimization" >> $GITHUB_STEP_SUMMARY