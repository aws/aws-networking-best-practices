name: PR Validation

on:
  pull_request:
    branches: [main, master]
    paths:
      - 'content/**'
      - 'mkdocs.yml'
      - '.github/workflows/**'

jobs:
  checklist-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR checklist completion
        uses: actions/github-script@v7
        with:
          script: |
            const prBody = context.payload.pull_request.body || '';
            
            const philosophyChecked = /- \[[xX]\].*(?:\[philosophy\]|philosophy)/i.test(prBody);
            const conventionsChecked = /- \[[xX]\].*(?:\[conventions\]|conventions)/i.test(prBody);
            
            if (!philosophyChecked || !conventionsChecked) {
              core.setFailed('Please check all required items in the PR checklist');
            }
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: 'content/**/*.md'
          config: '.github/.markdownlint-cli2.yaml'

  mkdocs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-mkdocs
        with:
          fetch-depth: 0
      - name: Build MkDocs site
        run: mkdocs build

  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          use-verbose-mode: 'yes'
          config-file: '.github/mlc_config.json'
          folder-path: 'content'

  spell-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: streetsidesoftware/cspell-action@v6
        with:
          files: 'content/**/*.md'
          config: '.github/cspell.json'

  yaml-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: mkdocs.yml
          config_file: .github/yamllint.yml

  file-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check file naming conventions
        run: |
          # Check for spaces in filenames
          if find content -name "* *" -type f | grep -q .; then
            echo "Error: Files with spaces found:"
            find content -name "* *" -type f
            exit 1
          fi
          
          # Check for uppercase in markdown files
          if find content -name "*.md" | grep -E '[A-Z]' | grep -q .; then
            echo "Warning: Uppercase letters in markdown filenames:"
            find content -name "*.md" | grep -E '[A-Z]'
          fi

  image-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check image optimization
        run: |
          # Find large images (>500KB)
          find content -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" \) -size +500k -exec ls -lh {} \; > large_images.txt
          if [ -s large_images.txt ]; then
            echo "Warning: Large images found (>500KB):"
            cat large_images.txt
          fi
          
          # Check for missing alt text in markdown
          if grep -r "!\[]\(" content/ --include="*.md" | grep -q .; then
            echo "Error: Images without alt text found:"
            grep -r "!\[]\(" content/ --include="*.md"
            exit 1
          fi

  prose-check:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install prose linting tools
        run: |
          npm install -g write-good alex
      - name: Check writing quality
        run: |
          echo "Checking prose quality..."
          find content -name "*.md" -exec write-good --no-passive {} \; || true
      - name: Check inclusive language
        run: |
          echo "Checking for inclusive language..."
          find content -name "*.md" -exec alex {} \; || true

  structure-check:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Validate navigation structure
        run: |
          # Check that all markdown files are referenced in mkdocs.yml
          echo "Checking navigation structure..."
          
          python3 << 'EOF'
          import re
          import os
          import glob
          
          # Read mkdocs.yml and extract nav section manually
          with open('mkdocs.yml', 'r') as f:
              content = f.read()
          
          # Extract nav section using regex
          nav_match = re.search(r'^nav:\\s*\\n((?:[ \\t]+.*\\n)*)', content, re.MULTILINE)
          if not nav_match:
              print("No nav section found in mkdocs.yml")
              exit(1)
          
          nav_content = nav_match.group(1)
          
          # Find all .md file references in nav
          nav_files = set()
          for line in nav_content.split('\\n'):
              # Look for .md files in the nav section
              md_matches = re.findall(r'([\\w/-]+\\.md)', line)
              nav_files.update(md_matches)
          
          # Get all actual markdown files
          md_files = set()
          for file in glob.glob('content/**/*.md', recursive=True):
              md_files.add(file.replace('content/', ''))
          
          # Find orphaned files
          orphaned = md_files - nav_files
          if orphaned:
              print("Warning: Files not in navigation:")
              for file in sorted(orphaned):
                  print(f"  - {file}")
          
          # Find missing files
          missing = nav_files - md_files
          if missing:
              print("Error: Navigation references missing files:")
              for file in sorted(missing):
                  print(f"  - {file}")
              exit(1)
          
          print("Navigation structure check completed successfully")
          EOF

  meta-check:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Check page metadata
        run: |
          echo "Checking for proper page titles..."
          
          # Check that each markdown file has a proper title
          for file in $(find content -name "*.md"); do
            if ! head -20 "$file" | grep -q "^# "; then
              echo "Warning: $file may be missing a main heading"
            fi
          done