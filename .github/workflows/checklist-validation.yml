name: Checklist Validation

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  validate-checklist:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR checklist completion
        uses: actions/github-script@v7
        with:
          script: |
            const prBody = context.payload.pull_request.body || '';
            
            // Check for required checklist items
            const philosophyChecked = /- \[[xX]\].*philosophy/i.test(prBody);
            const conventionsChecked = /- \[[xX]\].*conventions/i.test(prBody);
            
            let errors = [];
            
            if (!philosophyChecked) {
              errors.push('❌ Philosophy checklist item must be checked');
            }
            
            if (!conventionsChecked) {
              errors.push('❌ Conventions checklist item must be checked');
            }
            
            if (errors.length > 0) {
              const comment = `## ⚠️ Checklist Validation Failed
            
            Please ensure all required checklist items are checked in your PR description:
            
            ${errors.join('\n')}
            
            **Required format:**
            \`\`\`
            - [x] My submission follows the philosophy of this project
            - [x] My submission follows the conventions of this project
            \`\`\``;
              
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
              
              core.setFailed('PR checklist validation failed');
            } else {
              console.log('✅ All required checklist items are checked');
            }