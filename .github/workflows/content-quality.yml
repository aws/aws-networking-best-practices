name: Content Quality

on:
  pull_request:
    branches: [main, master]
    paths:
      - 'content/**/*.md'

jobs:
  prose-check:
    runs-on: ubuntu-latest
    continue-on-error: true  # TODO: Remove after improving prose quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install prose linting tools
        run: |
          npm install -g write-good alex
      - name: Check writing quality
        run: |
          echo "Checking prose quality..."
          find content -name "*.md" -exec write-good --no-passive {} \; || true
      - name: Check inclusive language
        run: |
          echo "Checking for inclusive language..."
          find content -name "*.md" -exec alex {} \; || true

  structure-check:
    runs-on: ubuntu-latest
    continue-on-error: true  # TODO: Remove after fixing navigation structure
    steps:
      - uses: actions/checkout@v4
      - name: Validate navigation structure
        run: |
          # Check that all markdown files are referenced in mkdocs.yml
          echo "Checking navigation structure..."
          
          # Extract markdown files from nav section
          python3 << 'EOF'
          import re
          import os
          import glob
          
          # Read mkdocs.yml and extract nav section manually
          with open('mkdocs.yml', 'r') as f:
              content = f.read()
          
          # Extract nav section using regex
          nav_match = re.search(r'^nav:\s*\n((?:[ \t]+.*\n)*)', content, re.MULTILINE)
          if not nav_match:
              print("No nav section found in mkdocs.yml")
              exit(1)
          
          nav_content = nav_match.group(1)
          
          # Find all .md file references in nav
          nav_files = set()
          for line in nav_content.split('\n'):
              # Look for .md files in the nav section
              md_matches = re.findall(r'([\w/-]+\.md)', line)
              nav_files.update(md_matches)
          
          # Get all actual markdown files
          md_files = set()
          for file in glob.glob('content/**/*.md', recursive=True):
              md_files.add(file.replace('content/', ''))
          
          # Find orphaned files
          orphaned = md_files - nav_files
          if orphaned:
              print("Warning: Files not in navigation:")
              for file in sorted(orphaned):
                  print(f"  - {file}")
          
          # Find missing files
          missing = nav_files - md_files
          if missing:
              print("Error: Navigation references missing files:")
              for file in sorted(missing):
                  print(f"  - {file}")
              exit(1)
          
          print("Navigation structure check completed successfully")
          EOF

  meta-check:
    runs-on: ubuntu-latest
    continue-on-error: true  # TODO: Remove after adding proper headings
    steps:
      - uses: actions/checkout@v4
      - name: Check page metadata
        run: |
          echo "Checking for proper page titles..."
          
          # Check that each markdown file has a proper title
          for file in $(find content -name "*.md"); do
            if ! head -20 "$file" | grep -q "^# "; then
              echo "Warning: $file may be missing a main heading"
            fi
          done