site_name: Networking Best Practices
site_url: https://aws.github.io/aws/aws-networking-best-practices/
repo_name: "aws/aws-networking-best-practices"
repo_url: https://github.com/aws/aws-networking-best-practices/
edit_uri: edit/master/content/
docs_dir: "content"
copyright: "<a href=\"https://aws.amazon.com/privacy/\">Privacy</a> | <a href=\"https://aws.amazon.com/accessibility/\">Accessibility</a> | <a href=\"https://aws.amazon.com/terms/\">Site Terms</a> | <a href=\"#__consent\">Cookie Preferences </a> | &copy; 2024, Amazon Web Services, Inc. or its affiliates. All rights reserved."
theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.ico
  palette:
    primary: custom
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil 
    view: material/eye
  features:
    - tabs
    - content.code.copy
    - announce.dismiss
    - header.autohide
    - toc.follow
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - navigation.expand
    - navigation.path
    - navigation.footer
nav:
  - Introduction:
    - index.md
    - About this Guide: howto/about.md
    - How to contribute: howto/contribute.md
  - Networking Basics:
    - basics/index.md
    - Page 1: basics/page1.md
  - Connectivity within AWS:
    - internalconnectivity/index.md
  - Connectivity to the Internet:
    - internetconnectivity/index.md
  - Connectivity to on-premises and multicloud:
    - hybridconnectivity/index.md
  - Network Security:
    - security/index.md
  - Monitoring, Logging & Observability:    
    - monitoringobservability/index.md

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - codehilite
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
extra_css:
  - stylesheets/extra.css
extra:
  generator: false
  analytics:
    provider: google
    property: G-ZCN9MVZ9P6 
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/emoticon-happy-outline
          name: This page was helpful
          data: 1
          note: >-
            Thanks for your feedback!
        - icon: material/emoticon-sad-outline
          name: This page could be improved
          data: 0
          note: >- 
            Thanks for your feedback! Help us improve this page by
            using our <a href="https://github.com/aws/aws-networking-best-practices/issues/new/choose" target="_blank" rel="noopener">feedback form</a>.
  consent:
    title: Cookie consent
    description: >- 
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.
plugins:
  - git-revision-date-localized:
      enable_creation_date: true
      fallback_to_build_date: true
  - git-authors
  - social